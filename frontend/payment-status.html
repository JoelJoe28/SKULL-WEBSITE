<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Status - SKULL Streetwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Press+Start+2P&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f7f3ec;
      --ink: #16120c;
      --muted: #8a7d68;
      --grass: #5d9e3f;
      --stone: #a8a8a8;
      --danger: #d32f2f;
      --font-body: "Nunito", sans-serif;
      --font-display: "Anton", sans-serif;
      --font-ui: "Press Start 2P", cursive;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 700;
    }

    .card {
      width: min(640px, 100%);
      background: white;
      border: 3px solid var(--ink);
      box-shadow: 8px 8px 0 var(--stone);
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-family: var(--font-display);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-size: 54px;
      line-height: 1;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.7;
    }

    .status {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      border-radius: 50%;
      border: 4px solid var(--ink);
      display: grid;
      place-items: center;
      font-size: 38px;
      background: var(--grass);
      color: white;
    }

    .status.error {
      background: var(--danger);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 3px solid var(--ink);
      background: white;
      color: var(--ink);
      text-decoration: none;
      font-family: var(--font-ui);
      font-size: 8px;
      padding: 15px 18px;
      box-shadow: 6px 6px 0 var(--stone);
    }

    .btn.primary {
      background: var(--ink);
      color: white;
      box-shadow: 6px 6px 0 var(--grass);
    }

    @media (max-width: 560px) {
      .btn-row {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="status" id="statusIcon">✓</div>
    <h1 id="statusTitle">Payment Updated</h1>
    <p id="statusCopy">Use this page as a lightweight fallback if another flow sends you here.</p>
    <div class="btn-row">
      <a class="btn primary" id="primaryLink" href="profile.html">VIEW PROFILE</a>
      <a class="btn" href="skull-combined.html">CONTINUE SHOPPING</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get("orderId");
    const status = (params.get("status") || "success").toLowerCase();
    const title = document.getElementById("statusTitle");
    const copy = document.getElementById("statusCopy");
    const icon = document.getElementById("statusIcon");
    const primary = document.getElementById("primaryLink");

    if (status.includes("fail") || status.includes("error")) {
      title.textContent = "Payment Failed";
      copy.textContent = "Your payment was not confirmed. Please return to checkout and try again.";
      icon.textContent = "!";
      icon.classList.add("error");
      primary.textContent = "TRY CHECKOUT AGAIN";
      primary.href = "checkout.html";
    } else if (orderId) {
      title.textContent = "Payment Successful";
      copy.textContent = `Order #SKULL-${String(orderId).slice(-6).padStart(6, "0")} is ready for confirmation.`;
      primary.textContent = "VIEW ORDER";
      primary.href = `order-confirmation.html?orderId=${orderId}`;
    }
  </script>
</body>
</html>
