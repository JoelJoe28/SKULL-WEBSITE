<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SKULL Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --cream:#F7F3EC; --parchment:#EEE8D5; --off-white:#FAF8F4;
            --grass:#5D9E3F; --grass-dark:#3E7228; --grass-light:#7BBF55;
            --dirt:#8B6340; --stone:#A8A8A8;
            --gold:#E8B400; --gold-light:#FFD700;
            --ink:#16120C; --ink-mid:#3A3020; --muted:#8A7D68;
            --sky-top:#B8DCFF; --sky-bot:#E8F4FF;
            --red:#D32F2F;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{
            font-family:'Nunito',sans-serif;
            background:var(--cream);
            color:var(--ink);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .register-container{
            background:var(--parchment);
            border:3px solid var(--ink);
            border-radius:8px;
            padding:40px;
            box-shadow:8px 8px 0 var(--stone);
            max-width:450px;
            width:100%;
        }
        h2{
            font-family:'Press Start 2P',cursive;
            font-size:24px;
            color:var(--ink);
            margin-bottom:30px;
            text-align:center;
        }
        .form-group{
            margin-bottom:20px;
        }
        label{
            display:block;
            font-family:'Press Start 2P',cursive;
            font-size:10px;
            color:var(--ink);
            margin-bottom:8px;
        }
        input{
            width:100%;
            padding:12px;
            border:2px solid var(--ink);
            border-radius:4px;
            font-family:'Nunito',sans-serif;
            font-size:14px;
            background:white;
            transition:border-color 0.2s;
        }
        input:focus{
            outline:none;
            border-color:var(--grass);
        }
        .form-row{
            display:flex;
            gap:15px;
        }
        .form-row .form-group{
            flex:1;
        }
        button{
            width:100%;
            font-family:'Press Start 2P',cursive;
            font-size:10px;
            padding:12px;
            border:2px solid var(--ink);
            background:var(--grass);
            color:white;
            cursor:pointer;
            transition:all 0.2s;
            border-radius:4px;
            font-weight:600;
        }
        button:hover:not(:disabled){
            background:var(--grass-dark);
            transform:translate(-2px,-2px);
            box-shadow:4px 4px 0 var(--ink);
        }
        button:disabled{
            opacity:0.75;
            cursor:wait;
        }
        .message-container{
            margin-bottom:20px;
        }
        .error-message{
            background:var(--red);
            color:white;
            padding:10px;
            border-radius:4px;
            margin-bottom:20px;
            font-size:12px;
            text-align:center;
        }
        .success-message{
            background:var(--grass);
            color:white;
            padding:10px;
            border-radius:4px;
            margin-bottom:20px;
            font-size:12px;
            text-align:center;
        }
        .login-link{
            text-align:center;
            margin-top:20px;
            font-size:12px;
            color:var(--muted);
        }
        .login-link a{
            color:var(--grass);
            text-decoration:none;
            font-weight:600;
        }
        .login-link a:hover{
            color:var(--grass-dark);
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Join SKULL</h2>

    <div id="message-container" class="message-container"></div>

    <form id="register-form" novalidate>
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="First name" required autocomplete="given-name">
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last name" required autocomplete="family-name">
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="Phone number (optional)" autocomplete="tel">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
        </div>

        <button type="submit" id="register-button">
            <i class="fa fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
    </div>
</div>

<script src="config.js"></script>
<script src="api-utils.js"></script>
<script src="store-utils.js"></script>
<script>
const form = document.getElementById("register-form");
const firstNameInput = document.getElementById("firstName");
const lastNameInput = document.getElementById("lastName");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirmPassword");
const registerButton = document.getElementById("register-button");
const messageContainer = document.getElementById("message-container");

function showMessage(type, text) {
    const className = type === "success" ? "success-message" : "error-message";
    messageContainer.innerHTML = `<div class="${className}">${text}</div>`;
}

function getApiBase() {
    // Use new API configuration
    if (window.API_CONFIG && typeof window.API_CONFIG.getApiBase === "function") {
        return window.API_CONFIG.getApiBase();
    }
    
    // Fallback for development
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
        return "http://localhost:5000";
    }
    
    // Production fallback
    return window.location.origin.replace(/\/$/, "");
}

async function fetchJson(response) {
    const text = await response.text();
    try {
        return text ? JSON.parse(text) : {};
    } catch (error) {
        return { message: text };
    }
}

async function registerWithLegacyApi(userData) {
    const response = await fetch(`${getApiBase()}/api/register`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(userData)
    });

    const data = await fetchJson(response);
    if (!response.ok) {
        throw new Error(data.error || data.message || "Registration failed");
    }

    return data;
}

async function register(userData) {
    try {
        // Use new API utilities first
        if (window.api && typeof window.api.register === "function") {
            return await window.api.register(userData);
        }
    } catch (error) {
        console.warn("New API registration failed, trying legacy route:", error);
    }

    // Fallback to legacy method
    if (window.SKULLStore && typeof window.SKULLStore.register === "function") {
        try {
            return await window.SKULLStore.register(userData);
        } catch (error) {
            console.warn("Primary registration route failed, trying legacy route:", error);
        }
    }

    return registerWithLegacyApi(userData);
}

function validateForm() {
    const firstName = firstNameInput.value.trim();
    const lastName = lastNameInput.value.trim();
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim();
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    if (!firstName || !lastName) {
        showMessage("error", "Please enter your full name");
        return false;
    }

    if (!email) {
        showMessage("error", "Please enter your email");
        return false;
    }

    if (!email.includes("@") || !email.includes(".")) {
        showMessage("error", "Please enter a valid email address");
        return false;
    }

    if (!password || password.length < 6) {
        showMessage("error", "Password must be at least 6 characters long");
        return false;
    }

    if (password !== confirmPassword) {
        showMessage("error", "Passwords do not match");
        return false;
    }

    return true;
}

async function handleRegister(event) {
    event.preventDefault();
    messageContainer.innerHTML = "";

    if (!validateForm()) {
        return;
    }

    const userData = {
        name: `${firstNameInput.value.trim()} ${lastNameInput.value.trim()}`,
        email: emailInput.value.trim().toLowerCase(),
        phone: phoneInput.value.trim(),
        password: passwordInput.value
    };

    registerButton.disabled = true;
    registerButton.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Creating account...';

    try {
        await register(userData);
        showMessage("success", "Account created successfully! Redirecting to login...");
        setTimeout(() => {
            window.location.href = "login.html";
        }, 2000);
    } catch (error) {
        showMessage("error", error.message || "Registration failed. Please try again.");
        console.error("Registration error:", error);
    } finally {
        registerButton.disabled = false;
        registerButton.innerHTML = '<i class="fa fa-user-plus"></i> Create Account';
    }
}

form.addEventListener("submit", handleRegister);
</script>

</body>
</html>
